<header class="header py-3 shadow mb-1">
  <div class="container-fluid"> 
    <nav class="d-flex align-items-center justify-content-between gap-3 flex-wrap flex-md-nowrap">
      
      <a href="/" class="flex-shrink-0">
        <div style="max-width: 240px;">
          <picture>
            <source media="(max-width: 520px)" srcset="Serve-Mobilia.svg">
            <img src="Serve Mobilia Logo com nome.svg" alt="Logo Marca" class="img-fluid batata">
          </picture>
        </div>
      </a>

      <div class="d-flex align-items-center gap-3 flex-shrink-0">
        <a class="nav-link fw-semibold text-white d-flex align-items-center gap-1" href="carrinho">
          <span class="material-symbols-outlined">shopping_cart</span>
          <span>Carrinho</span>
        </a> 
        
        <a class="nav-link fw-semibold text-white d-flex align-items-center gap-1" href="login">
          <span class="material-symbols-outlined">account_circle</span>
          <span>Login</span>
        </a>
      </div>

    </nav>
  </div>
</header>

<div class="d-flex justify-content-center">
  <div class="flex-grow-1 mx-3" style="max-width: 600px; min-width: 250px;">
    
    <form (ngSubmit)="executarBusca()" class="m-0">
      <div class="input-group barradepesquisa">
        
        <input 
          type="text" 
          class="form-control" 
          placeholder="Busca" 
          aria-label="Busca" 
          name="pesquisa"
          [(ngModel)]="termoPesquisa"
        >
        
        <button class="btn btn-primary d-flex align-items-center btn-laranja-custom" type="submit">
          <span class="material-symbols-outlined">search</span>
        </button>
      </div>
    </form>

  </div>
</div>
<hr>

<router-outlet />
<hr>
<footer class="mt-4 p-5">
  <h5>AMS - 2026</h5>
</footer>
