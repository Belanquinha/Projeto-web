<main class="container shadow p-3 mb-5 bg-body-tertiary rounded">
    <h2 style="align-self: center;">Cadastro</h2> <br>
    <div>
        <div class="mb-3 mt-3">
            <label class="form-label" for="nome">Nome</label> <br>
            <input class="form-control" id="nome" type="text" [(ngModel)]="obj.nome"> <br>
        </div>

        <div>
            <label class="form-label" for="email">Email</label> <br>
            <input class="form-control" id="email" type="email" [(ngModel)]="obj.email"> <br>
        </div>

        <div>
            <label class="form-label" for="senha">Senha</label> <br>
            <input class="form-control" id="senha" type="password" [(ngModel)]="obj.senha"> <br>
        </div>
        <div>
            <label class="form-label" for="senha">Confirmar</label> <br>
            <input class="form-control" id="senha" type="password" [(ngModel)]="obj.senha"> <br>
        </div>
        

        <div>
            <label class="form-label" for="telefone">Telefone</label> <br>
            <input class="form-control" id="telefone" type="text" [(ngModel)]="obj.telefone"> <br>
        </div>

        <div>
            <label class="form-label" for="telefone">CPF</label> <br>
            <input class="form-control" id="telefone" type="text" [(ngModel)]="obj.telefone"> <br>
        </div>
        
        <hr>

        <button type="button" (click)="gravar();" class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#myModal">Cadastrar</button>
    </div>


    <!-- o modal -->
    <div class="modal" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

        <!-- Modal Header -->
        <div class="modal-header">
            <h4 class="modal-title">Cadastrado com Sucesso</h4>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- Modal body -->
        <div class="modal-body">
            Seu codigo: {{mensagem}}
        </div>

        <!-- Modal footer -->
        <div class="modal-footer">
            <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
        </div>

        </div>
    </div>
    </div>
</main>
