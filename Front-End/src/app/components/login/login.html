<div class="container d-flex justify-content-center align-items-center py-4">
  
  <div class="card shadow p-4 p-md-5 bg-body-tertiary rounded-4 w-100" style="max-width: 450px;">
    
    <div class="text-center mb-4">
      <h2 class="fw-bold text-dark mb-1">Login</h2>
    </div>

    <form>
      <div class="mb-3">
        <label class="form-label fw-semibold text-secondary" for="email">E-mail</label>
        <input class="form-control form-control-lg" id="email" type="email" placeholder="seu@email.com" [(ngModel)]="obj.email" name="email">
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label fw-semibold text-secondary mb-0" for="senha">Senha</label>
          
        </div>
        <input class="form-control form-control-lg" id="senha" type="password" placeholder="Sua senha" [(ngModel)]="obj.senha" name="senha">
      </div>
                <a href="esqueci-senha" class="text-decoration-none small text-muted">Esqueceu a senha?</a>

      <button type="button" (click)="gravar();" class="btn btn-lg btn-laranja-custom w-100 fw-bold text-white shadow-sm mt-3" data-bs-toggle="modal" data-bs-target="#myModal">
        Entrar
      </button>
    </form>

    <hr class="my-4 text-muted">

    <div class="text-center">
      <p class="mb-0 text-secondary">
        Não possui uma conta? 
        <a href="cadastro" class="fw-bold text-decoration-none " style="color: #FA812F">Crie uma agora</a>
      </p>
    </div>


    
</div>
</div>





    <!-- o modal -->
    <div class="modal" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">

        <!-- Modal Header -->
        <div class="modal-header">
            <h4 class="modal-title">Cadastrado com Sucesso</h4>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- Modal body -->
        <div class="modal-body">
            Seu codigo: {{mensagem}}
        </div>

        <!-- Modal footer -->
        <div class="modal-footer">
            <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
        </div>

        </div>
    </div>
    </div>
