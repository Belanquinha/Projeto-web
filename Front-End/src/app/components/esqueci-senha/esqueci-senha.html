<div class="container d-flex justify-content-center align-items-center py-4">
  
  <main class="card shadow p-4 p-md-5 bg-body-tertiary rounded-4 w-100" style="max-width: 450px;">
    
    <div class="text-center mb-4">
      <h2 class="fw-bold text-dark mb-1">Recuperar Senha</h2>
    </div>

    <form #recuperarForm="ngForm" (ngSubmit)="processarRecuperacao(recuperarForm)" novalidate>
      <div class="mb-3">
        <label class="form-label text-secondary mb-1" for="email">Digite seu E-mail</label>
        <input 
          class="form-control form-control-lg" 
          id="email" 
          type="email" 
          placeholder="seu@email.com" 
          name="email"
          [(ngModel)]="dadosRecuperacao.email"
          required
        >
      </div>

      <div class="mb-4">
        <label class="form-label text-secondary mb-1" for="senha">Digite sua nova senha</label>
        <input 
          class="form-control form-control-lg" 
          id="senha" 
          type="password" 
          placeholder="Nova senha" 
          name="senha"
          [(ngModel)]="dadosRecuperacao.senha"
          required
        >
      </div>

      <button type="submit" class="btn btn-lg btn-laranja-custom w-100 text-white shadow-sm">
        Confirmar Alteração
      </button>

      <div class="text-center mt-3">
        <a routerLink="/login" class="text-decoration-none small text-muted">Voltar para o Login</a>
      </div>
    </form>

  </main>
</div>

<div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow">
      
      <div class="modal-header border-0 rounded-top-4" [ngClass]="classeModal">
        <h5 class="modal-title fw-bold" id="myModalLabel">
          {{ tituloModal }}
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body p-4 text-center">
        <p class="fs-5 mb-1 text-dark">{{ mensagemModal }}</p>
        <p *ngIf="sucesso" class="text-muted small">Agora você já pode utilizar suas novas credenciais para acessar o sistema.</p>
      </div>

      <div class="modal-footer border-0 justify-content-center pb-4">
        <button 
          type="button" 
          class="btn btn-laranja-custom px-4 fw-semibold text-white border-0" 
          [ngClass]="sucesso ? 'btn-success' : 'btn-danger'"
          (click)="sucesso ? irParaLogin() : null" 
          data-bs-dismiss="modal"
        >
          {{ sucesso ? 'Ir para o Login' : 'Fechar' }}
        </button>
      </div>

    </div>
  </div>
</div>
