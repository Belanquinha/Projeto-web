<main class="container my-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10 shadow-sm p-3 mb-5 bg-body-tertiary rounded">
      
      <ng-container *ngFor="let obj of lista">
        <div class="card border-0 bg-transparent" *ngIf="obj.codigo == codigoPego">
          
          <div class="row g-4 align-items-center">
            
            <div class="col-12 col-sm-6">
              <div class="p-2 text-center">
                <img src="img{{obj.codigo}}.webp" class="img-fluid rounded shadow-sm" alt="{{obj.nome}}">
              </div>
            </div>
            
            <div class="col-12 col-sm-6 d-flex flex-column gap-3">
              <div>
                <h1 class="h2 fw-bold text-dark mb-1">{{obj.nome}}</h1>
                
                <h2 class="h3 fw-semibold cor-laranja-custom">R$ {{obj.valor}}</h2>
              </div>
              
              <div class="border-top pt-3">
                <h6 class="fw-bold text-secondary mb-1">Descrição:</h6>
                <p class="text-muted m-0">{{obj.descritivo}}</p>
              </div>
              
              <!-- botão de comprar -->
              <div class="mt-2">
                <button class="btn btn-lg btn-laranja-custom w-100 py-3 fw-bold">Adicionar ao Carrinho</button>
              </div>
              
            </div>
          </div></div>
      </ng-container>
      
    </div>
  </div>
</main>
