<main class="container my-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10 shadow-sm p-3 mb-5 bg-body-tertiary rounded">
      
      <div class="card border-0 bg-transparent" *ngIf="produto">
        
        <div class="row g-4 align-items-center">
          
          <div class="col-12 col-sm-6">
            <div class="p-2 text-center">
              <img src="img{{produto.id}}.webp" class="img-fluid rounded shadow-sm" alt="{{produto.nome}}">
            </div>
          </div>
          
          <div class="col-12 col-sm-6 d-flex flex-column gap-3">
            <div>
              <h1 class="h2 fw-bold text-dark mb-1">{{produto.nome}}</h1>
              <h2 class="h3 fw-semibold cor-laranja-custom">R$ {{produto.valor}}</h2>
            </div>
            
            <div class="border-top pt-3">
              <h6 class="fw-bold text-secondary mb-1">Descrição:</h6>
              <p class="text-muted m-0">{{produto.descritivo}}</p>
            </div>
            
            <div class="mt-2">
              <button class="btn btn-lg btn-laranja-custom w-100 py-3 fw-bold" (click)="adicionarAoCarrinho()">Adicionar ao Carrinho</button>
            </div>
            
          </div>
        </div>

      </div>

      <div *ngIf="!produto" class="text-center my-5 text-muted">
        <p>Buscando informações do produto no servidor...</p>
      </div>
      
    </div>
  </div>
</main>
